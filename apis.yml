aid: supabase
name: Supabase
description: >-
  Supabase is an open-source Firebase alternative that provides a suite of
  backend services built on top of PostgreSQL. It offers a managed PostgreSQL
  database with auto-generated REST and GraphQL APIs via PostgREST, real-time
  data subscriptions via WebSockets, user authentication with JWT (GoTrue),
  file storage with S3-compatible object storage, edge compute via globally
  distributed TypeScript functions on the Deno runtime, and a management API
  for programmatic control of projects and organizations. Supabase is available
  as a fully managed cloud service (app.supabase.com) and as a self-hosted
  open-source deployment.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Backend As A Service
  - PostgreSQL
  - Open Source
  - Authentication
