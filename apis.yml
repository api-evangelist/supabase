apis:
  - aid: supabase:management-api
    name: Supabase Management API
    description: >-
      The Supabase Management API provides programmatic access to manage
      Supabase projects and organizations. Supports creating, configuring,
      pausing, and deleting projects; managing database migrations and
      extensions; deploying Edge Functions; managing secrets; configuring
      custom domains and vanity subdomains; controlling network restrictions;
      and managing organization membership. Authentication uses personal access
      tokens or OAuth2 tokens. Base URL: https://api.supabase.com/v1.
    humanURL: https://supabase.com/docs/reference/api/introduction
    tags:
      - Management
      - Projects
      - Organizations
      - Edge Functions
      - Database
    properties:
      - type: Documentation
        url: https://supabase.com/docs/reference/api/introduction
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/supabase/refs/heads/main/openapi/supabase-management-api-openapi.yml
  - aid: supabase:auth-api
    name: Supabase Auth API
    description: >-
      The Supabase Auth API (based on GoTrue) is a JWT-based authentication
      service supporting user signup, email/password sign-in, magic links,
      one-time passwords (OTP), OAuth2 social login (Google, GitHub, etc.),
      token refresh, multi-factor authentication (TOTP/WebAuthn), SAML-based
      SSO, and administrative user management. Authentication uses an apikey
      header (anon or service_role key) plus JWT bearer tokens for user context.
      Per-project base URL: https://{project_ref}.supabase.co/auth/v1.
    humanURL: https://supabase.com/docs/guides/auth
    tags:
      - Authentication
      - Users
      - OAuth
      - JWT
      - MFA
      - SAML
    properties:
      - type: Documentation
        url: https://supabase.com/docs/guides/auth
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/supabase/refs/heads/main/openapi/supabase-auth-api-openapi.yml
  - aid: supabase:storage-api
    name: Supabase Storage API
    description: >-
      The Supabase Storage API enables developers to store, organize, and
      serve large files in S3-compatible object storage. Provides bucket
      management (public/private), file upload (standard and TUS resumable),
      download, deletion, and on-the-fly image transformations (resize, format,
      quality). Access control is enforced via Row Level Security policies.
      Supports signed URLs for temporary access. Per-project base URL:
      https://{project_ref}.supabase.co/storage/v1.
    humanURL: https://supabase.com/docs/guides/storage
    tags:
      - Storage
      - File Upload
      - Buckets
      - Images
      - S3
    properties:
      - type: Documentation
        url: https://supabase.com/docs/guides/storage
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/supabase/refs/heads/main/openapi/supabase-storage-api-openapi.yml
  - aid: supabase:database-rest-api
    name: Supabase Database REST API
    description: >-
      The Supabase Database REST API provides auto-generated RESTful endpoints
      for every table, view, and stored function in the PostgreSQL database,
      powered by PostgREST. Supports full CRUD operations with advanced
      filtering operators (eq, neq, gt, lt, like, ilike, in, fts, cs, cd,
      ov, adj, not, or, and), horizontal and vertical filtering, pagination,
      ordering, and embedding related resources via foreign key relationships.
      Row Level Security policies are enforced on all requests. Per-project
      base URL: https://{project_ref}.supabase.co/rest/v1.
    humanURL: https://supabase.com/docs/guides/api
    tags:
      - Database
      - REST
      - PostgreSQL
      - PostgREST
      - CRUD
    properties:
      - type: Documentation
        url: https://supabase.com/docs/guides/api
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/supabase/refs/heads/main/openapi/supabase-database-rest-api-openapi.yml
  - aid: supabase:edge-functions-api
    name: Supabase Edge Functions API
    description: >-
      Supabase Edge Functions are globally distributed, server-side TypeScript
      functions powered by the Deno runtime. They are deployed and invoked via
      HTTP requests to a project-specific URL. Functions can access Supabase
      client libraries to interact with the database, auth, and storage
      services. JWT verification is required by default but can be disabled
      per function. Per-project base URL:
      https://{project_ref}.supabase.co/functions/v1.
    humanURL: https://supabase.com/docs/guides/functions
    tags:
      - Edge Functions
      - Serverless
      - Deno
      - TypeScript
    properties:
      - type: Documentation
        url: https://supabase.com/docs/guides/functions
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/supabase/refs/heads/main/openapi/supabase-edge-functions-api-openapi.yml
  - aid: supabase:realtime-api
    name: Supabase Realtime API
    description: >-
      The Supabase Realtime API provides WebSocket-based subscriptions for
      real-time data changes from PostgreSQL databases. It supports three
      channel types: database change events (INSERT/UPDATE/DELETE on tables
      via logical replication), presence (track and synchronize connected
      users' state), and broadcast (low-latency message passing between
      clients). Authentication uses JWT tokens. Implemented using the Phoenix
      channels protocol.
    humanURL: https://supabase.com/docs/guides/realtime
    tags:
      - Realtime
      - WebSocket
      - Database
      - Presence
      - Broadcast
    properties:
      - type: Documentation
        url: https://supabase.com/docs/guides/realtime
      - type: AsyncAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/supabase/refs/heads/main/asyncapi/supabase-realtime-api-asyncapi.yml
