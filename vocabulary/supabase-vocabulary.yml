vocabulary:
  name: Supabase Vocabulary
  description: >-
    Domain vocabulary for Supabase, an open-source Firebase alternative built on
    PostgreSQL. Covers core concepts across database, authentication, storage,
    realtime, and edge functions services.
  version: '1.0'
  created: '2026-05-02'
  modified: '2026-05-02'
  tags:
    - Supabase
    - Backend As A Service
    - PostgreSQL
    - Authentication
    - Storage
    - Realtime

terms:
  - term: Project
    definition: >-
      A Supabase project is an isolated environment containing a dedicated
      PostgreSQL database, Auth service, Storage service, and Edge Functions
      runtime. Each project has a unique reference ID (ref) and is accessible
      at {ref}.supabase.co.
    category: Management

  - term: Project Ref
    definition: >-
      A unique identifier for a Supabase project, typically a string like
      "abcdefghijklmnop". Used to construct per-project API URLs (e.g.
      https://{ref}.supabase.co/rest/v1).
    category: Management

  - term: Personal Access Token
    definition: >-
      A bearer token issued via the Supabase dashboard for authenticating to
      the Management API. Used for programmatic project and organization
      management outside of user authentication flows.
    category: Authentication

  - term: Anon Key
    definition: >-
      The public API key (type: anon) for a Supabase project. Safe for use
      in browser/client code. Access is controlled by Row Level Security
      policies on the database.
    category: Authentication

  - term: Service Role Key
    definition: >-
      A privileged API key (type: service_role) for a Supabase project that
      bypasses Row Level Security. Must be kept secret and used only in
      server-side code. Grants admin-level access to auth and database.
    category: Authentication

  - term: Row Level Security (RLS)
    definition: >-
      PostgreSQL feature used by Supabase to restrict which rows a user can
      read, insert, update, or delete based on JWT claims or user identity.
      Enabled per table; anon and authenticated users are subject to RLS policies.
    category: Database

  - term: PostgREST
    definition: >-
      The open-source tool used by Supabase to auto-generate a RESTful API
      from a PostgreSQL database schema. Converts HTTP requests to SQL queries
      with support for filtering, embedding, and RPC.
    category: Database

  - term: GoTrue
    definition: >-
      The open-source authentication server (originally by Netlify) that
      powers Supabase Auth. Provides JWT-based authentication with support
      for email/password, OAuth2, magic links, OTP, MFA, and SAML SSO.
    category: Authentication

  - term: Edge Function
    definition: >-
      A serverless TypeScript function deployed globally on the Deno runtime
      at the edge (via Deno Deploy). Invoked via HTTP at
      {ref}.supabase.co/functions/v1/{slug}. Has access to Supabase client
      libraries and can use Deno's native APIs.
    category: Edge Functions

  - term: Bucket
    definition: >-
      A top-level container in Supabase Storage for organizing files and
      objects. Buckets can be public (files accessible without auth) or
      private (requires authentication). Access is controlled via RLS policies.
    category: Storage

  - term: Signed URL
    definition: >-
      A time-limited URL generated by Supabase Storage that grants temporary
      access to a private file without requiring authentication headers.
      Configured with an expiry duration in seconds.
    category: Storage

  - term: Realtime Channel
    definition: >-
      A named WebSocket subscription in Supabase Realtime. Channels can
      subscribe to database changes (INSERT/UPDATE/DELETE), presence state
      (connected users), or broadcast messages between clients.
    category: Realtime

  - term: Realtime Presence
    definition: >-
      A Supabase Realtime feature that synchronizes shared state between
      connected clients on a channel. Commonly used to track online users,
      cursors, or collaborative state.
    category: Realtime

  - term: Migration
    definition: >-
      A versioned SQL script that modifies the database schema. Supabase
      supports migrations via the Management API (createDatabaseMigration
      endpoint) and the Supabase CLI for version-controlled schema management.
    category: Database

  - term: Organization
    definition: >-
      A Supabase organization groups one or more projects and manages team
      membership, billing, and access control. An organization can have
      multiple members with different roles (owner, developer).
    category: Management

  - term: TUS Protocol
    definition: >-
      An open protocol for resumable file uploads used by Supabase Storage
      for large file uploads. Allows interrupted uploads to be resumed from
      the last uploaded byte rather than starting over.
    category: Storage

  - term: JWT
    definition: >-
      JSON Web Token. Used throughout Supabase as the authentication mechanism.
      Auth tokens contain user identity claims and are verified by database
      RLS policies to enforce row-level access control.
    category: Authentication

  - term: SAML SSO
    definition: >-
      Security Assertion Markup Language Single Sign-On. Supported by Supabase
      Auth for enterprise identity providers (IdPs) via the SAML 2.0 protocol.
      Configured per organization.
    category: Authentication
