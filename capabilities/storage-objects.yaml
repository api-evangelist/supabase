naftiko: 1.0.0-alpha2
info:
  label: Supabase Storage API — Objects
  description: 'Supabase Storage API — Objects. 9 operations. Lead operation: Download a private file. Self-contained Naftiko
    capability covering one Supabase business surface.'
  tags:
  - Supabase
  - Objects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SUPABASE_API_KEY: SUPABASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: storage-objects
    baseUri: https://{project_ref}.supabase.co/storage/v1
    description: Supabase Storage API — Objects business capability. Self-contained, no shared references.
    resources:
    - name: object-authenticated-bucketName-objectPath
      path: /object/authenticated/{bucketName}/{objectPath}
      operations:
      - name: downloadauthenticatedobject
        method: GET
        description: Download a private file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: object-copy
      path: /object/copy
      operations:
      - name: copyobject
        method: POST
        description: Copy a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: object-list-bucketName
      path: /object/list/{bucketName}
      operations:
      - name: listobjects
        method: POST
        description: List objects in a bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: object-move
      path: /object/move
      operations:
      - name: moveobject
        method: POST
        description: Move a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: object-public-bucketName-objectPath
      path: /object/public/{bucketName}/{objectPath}
      operations:
      - name: downloadpublicobject
        method: GET
        description: Download a public file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: object-sign-bucketName-objectPath
      path: /object/sign/{bucketName}/{objectPath}
      operations:
      - name: createsignedurl
        method: POST
        description: Create a signed URL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: object-bucketName-objectPath
      path: /object/{bucketName}/{objectPath}
      operations:
      - name: uploadobject
        method: POST
        description: Upload a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: x-upsert
          in: header
          type: boolean
          description: Whether to overwrite an existing file at the same path
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updateobject
        method: PUT
        description: Update (replace) a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteobject
        method: DELETE
        description: Delete a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SUPABASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: storage-objects-rest
    port: 8080
    description: REST adapter for Supabase Storage API — Objects. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/object/authenticated/{bucketname}/{objectpath}
      name: object-authenticated-bucketname-objectpath
      description: REST surface for object-authenticated-bucketName-objectPath.
      operations:
      - method: GET
        name: downloadauthenticatedobject
        description: Download a private file
        call: storage-objects.downloadauthenticatedobject
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/object/copy
      name: object-copy
      description: REST surface for object-copy.
      operations:
      - method: POST
        name: copyobject
        description: Copy a file
        call: storage-objects.copyobject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/object/list/{bucketname}
      name: object-list-bucketname
      description: REST surface for object-list-bucketName.
      operations:
      - method: POST
        name: listobjects
        description: List objects in a bucket
        call: storage-objects.listobjects
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/object/move
      name: object-move
      description: REST surface for object-move.
      operations:
      - method: POST
        name: moveobject
        description: Move a file
        call: storage-objects.moveobject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/object/public/{bucketname}/{objectpath}
      name: object-public-bucketname-objectpath
      description: REST surface for object-public-bucketName-objectPath.
      operations:
      - method: GET
        name: downloadpublicobject
        description: Download a public file
        call: storage-objects.downloadpublicobject
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/object/sign/{bucketname}/{objectpath}
      name: object-sign-bucketname-objectpath
      description: REST surface for object-sign-bucketName-objectPath.
      operations:
      - method: POST
        name: createsignedurl
        description: Create a signed URL
        call: storage-objects.createsignedurl
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/object/{bucketname}/{objectpath}
      name: object-bucketname-objectpath
      description: REST surface for object-bucketName-objectPath.
      operations:
      - method: POST
        name: uploadobject
        description: Upload a file
        call: storage-objects.uploadobject
        with:
          x-upsert: rest.x-upsert
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateobject
        description: Update (replace) a file
        call: storage-objects.updateobject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteobject
        description: Delete a file
        call: storage-objects.deleteobject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: storage-objects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Supabase Storage API — Objects. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: download-private-file
      description: Download a private file
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: storage-objects.downloadauthenticatedobject
      outputParameters:
      - type: object
        mapping: $.
    - name: copy-file
      description: Copy a file
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: storage-objects.copyobject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-objects-bucket
      description: List objects in a bucket
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: storage-objects.listobjects
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: move-file
      description: Move a file
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: storage-objects.moveobject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: download-public-file
      description: Download a public file
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: storage-objects.downloadpublicobject
      outputParameters:
      - type: object
        mapping: $.
    - name: create-signed-url
      description: Create a signed URL
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: storage-objects.createsignedurl
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-file
      description: Upload a file
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: storage-objects.uploadobject
      with:
        x-upsert: tools.x-upsert
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-replace-file
      description: Update (replace) a file
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: storage-objects.updateobject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-file
      description: Delete a file
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: storage-objects.deleteobject
      outputParameters:
      - type: object
        mapping: $.
