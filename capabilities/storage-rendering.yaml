naftiko: 1.0.0-alpha2
info:
  label: Supabase Storage API — Rendering
  description: 'Supabase Storage API — Rendering. 2 operations. Lead operation: Render a transformed private image. Self-contained
    Naftiko capability covering one Supabase business surface.'
  tags:
  - Supabase
  - Rendering
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SUPABASE_API_KEY: SUPABASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: storage-rendering
    baseUri: https://{project_ref}.supabase.co/storage/v1
    description: Supabase Storage API — Rendering business capability. Self-contained, no shared references.
    resources:
    - name: render-image-authenticated-bucketName-objectPath
      path: /render/image/authenticated/{bucketName}/{objectPath}
      operations:
      - name: renderauthenticatedimage
        method: GET
        description: Render a transformed private image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: render-image-public-bucketName-objectPath
      path: /render/image/public/{bucketName}/{objectPath}
      operations:
      - name: renderpublicimage
        method: GET
        description: Render a transformed public image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SUPABASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: storage-rendering-rest
    port: 8080
    description: REST adapter for Supabase Storage API — Rendering. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/render/image/authenticated/{bucketname}/{objectpath}
      name: render-image-authenticated-bucketname-objectpath
      description: REST surface for render-image-authenticated-bucketName-objectPath.
      operations:
      - method: GET
        name: renderauthenticatedimage
        description: Render a transformed private image
        call: storage-rendering.renderauthenticatedimage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/render/image/public/{bucketname}/{objectpath}
      name: render-image-public-bucketname-objectpath
      description: REST surface for render-image-public-bucketName-objectPath.
      operations:
      - method: GET
        name: renderpublicimage
        description: Render a transformed public image
        call: storage-rendering.renderpublicimage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: storage-rendering-mcp
    port: 9090
    transport: http
    description: MCP adapter for Supabase Storage API — Rendering. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: render-transformed-private-image
      description: Render a transformed private image
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: storage-rendering.renderauthenticatedimage
      outputParameters:
      - type: object
        mapping: $.
    - name: render-transformed-public-image
      description: Render a transformed public image
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: storage-rendering.renderpublicimage
      outputParameters:
      - type: object
        mapping: $.
