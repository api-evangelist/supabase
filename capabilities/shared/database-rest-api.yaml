naftiko: "1.0.0-alpha1"

info:
  label: "Supabase Database REST API"
  description: "Auto-generated RESTful endpoints for PostgreSQL tables via PostgREST with full CRUD, filtering, and RPC."
  tags:
    - Supabase
    - Database
    - PostgreSQL
    - PostgREST
    - CRUD
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SUPABASE_ANON_KEY: SUPABASE_ANON_KEY
      SUPABASE_PROJECT_REF: SUPABASE_PROJECT_REF

capability:
  consumes:
    - type: http
      namespace: supabase-db
      baseUri: "https://{{SUPABASE_PROJECT_REF}}.supabase.co/rest/v1"
      description: "Supabase PostgREST auto-generated database REST API"
      authentication:
        type: apikey
        key: apikey
        value: "{{SUPABASE_ANON_KEY}}"
        placement: header
      resources:
        - name: table
          path: /{table}
          description: "CRUD operations on database tables"
          operations:
            - name: select-rows
              method: GET
              description: "Select rows from a table"
              inputParameters:
                - name: table
                  in: path
                  type: string
                  required: true
                  description: "Table or view name"
                - name: select
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated columns to return"
                - name: order
                  in: query
                  type: string
                  required: false
                  description: "Column to sort by"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum rows to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Rows to skip"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: insert-rows
              method: POST
              description: "Insert rows into a table"
              inputParameters:
                - name: table
                  in: path
                  type: string
                  required: true
                  description: "Table name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
              body:
                type: json
                data:
                  row_data: "{{tools.row_data}}"
            - name: update-rows
              method: PATCH
              description: "Update rows in a table"
              inputParameters:
                - name: table
                  in: path
                  type: string
                  required: true
                  description: "Table name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
              body:
                type: json
                data:
                  updates: "{{tools.updates}}"
            - name: delete-rows
              method: DELETE
              description: "Delete rows from a table"
              inputParameters:
                - name: table
                  in: path
                  type: string
                  required: true
                  description: "Table name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

        - name: rpc
          path: /rpc/{function_name}
          description: "Invoke PostgreSQL stored functions"
          operations:
            - name: invoke-function
              method: POST
              description: "Invoke a PostgreSQL function"
              inputParameters:
                - name: function_name
                  in: path
                  type: string
                  required: true
                  description: "PostgreSQL function name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  args: "{{tools.args}}"

  exposes:
    - type: rest
      port: 8103
      namespace: supabase-db-api
      resources:
        - path: /v1/data/{table}
          name: table
          operations:
            - method: GET
              name: select-rows
              description: "Query rows from a table"
              call: "supabase-db.select-rows"
              with:
                table: "rest.table"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: insert-rows
              description: "Insert rows into a table"
              call: "supabase-db.insert-rows"
              with:
                table: "rest.table"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: supabase-db-mcp
      transport: http
      tools:
        - name: select-rows
          description: "Query rows from a database table with filtering and pagination"
          hints:
            readOnly: true
            openWorld: false
          call: "supabase-db.select-rows"
          with:
            table: "tools.table"
            select: "tools.select"
            limit: "tools.limit"
            offset: "tools.offset"
          outputParameters:
            - type: array
              mapping: "$."
        - name: insert-rows
          description: "Insert one or more rows into a table"
          hints:
            readOnly: false
            destructive: false
          call: "supabase-db.insert-rows"
          with:
            table: "tools.table"
            row_data: "tools.row_data"
          outputParameters:
            - type: array
              mapping: "$."
        - name: update-rows
          description: "Update rows matching filter criteria"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "supabase-db.update-rows"
          with:
            table: "tools.table"
            updates: "tools.updates"
          outputParameters:
            - type: array
              mapping: "$."
        - name: invoke-function
          description: "Call a PostgreSQL stored function via RPC"
          hints:
            readOnly: false
            destructive: false
          call: "supabase-db.invoke-function"
          with:
            function_name: "tools.function_name"
            args: "tools.args"
          outputParameters:
            - type: object
              mapping: "$."
