naftiko: "1.0.0-alpha1"

info:
  label: "Supabase Auth API"
  description: "JWT-based authentication service for user management, OAuth social login, MFA, and SAML SSO."
  tags:
    - Supabase
    - Authentication
    - Users
    - JWT
    - MFA
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SUPABASE_ANON_KEY: SUPABASE_ANON_KEY
      SUPABASE_SERVICE_ROLE_KEY: SUPABASE_SERVICE_ROLE_KEY
      SUPABASE_PROJECT_REF: SUPABASE_PROJECT_REF

capability:
  consumes:
    - type: http
      namespace: supabase-auth
      baseUri: "https://{{SUPABASE_PROJECT_REF}}.supabase.co/auth/v1"
      description: "Supabase Auth API for user authentication and management"
      authentication:
        type: apikey
        key: apikey
        value: "{{SUPABASE_ANON_KEY}}"
        placement: header
      resources:
        - name: signup
          path: /signup
          description: "User registration"
          operations:
            - name: sign-up
              method: POST
              description: "Sign up a new user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  password: "{{tools.password}}"

        - name: token
          path: /token
          description: "User authentication token operations"
          operations:
            - name: sign-in
              method: POST
              description: "Sign in with credentials"
              inputParameters:
                - name: grant_type
                  in: query
                  type: string
                  required: true
                  description: "Grant type: password, refresh_token, or id_token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  password: "{{tools.password}}"

        - name: logout
          path: /logout
          description: "User logout"
          operations:
            - name: sign-out
              method: POST
              description: "Sign out a user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: user
          path: /user
          description: "Current user operations"
          operations:
            - name: get-user
              method: GET
              description: "Get the current user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-user
              method: PUT
              description: "Update the current user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  password: "{{tools.password}}"

        - name: admin-users
          path: /admin/users
          description: "Administrative user management (requires service_role key)"
          operations:
            - name: list-users
              method: GET
              description: "List all users (admin)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Create a user (admin)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  password: "{{tools.password}}"

  exposes:
    - type: rest
      port: 8101
      namespace: supabase-auth-api
      resources:
        - path: /v1/auth/signup
          name: signup
          operations:
            - method: POST
              name: sign-up
              description: "Register a new user"
              call: "supabase-auth.sign-up"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/auth/signin
          name: signin
          operations:
            - method: POST
              name: sign-in
              description: "Sign in with email and password"
              call: "supabase-auth.sign-in"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/auth/users
          name: admin-users
          operations:
            - method: GET
              name: list-users
              description: "List all users (admin)"
              call: "supabase-auth.list-users"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: supabase-auth-mcp
      transport: http
      tools:
        - name: sign-up
          description: "Register a new user with email and password"
          hints:
            readOnly: false
            destructive: false
          call: "supabase-auth.sign-up"
          with:
            email: "tools.email"
            password: "tools.password"
          outputParameters:
            - type: object
              mapping: "$."
        - name: sign-in
          description: "Sign in a user with credentials"
          hints:
            readOnly: false
            destructive: false
          call: "supabase-auth.sign-in"
          with:
            email: "tools.email"
            password: "tools.password"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user
          description: "Get the currently authenticated user"
          hints:
            readOnly: true
            openWorld: false
          call: "supabase-auth.get-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List all users (requires admin/service_role key)"
          hints:
            readOnly: true
            openWorld: false
          call: "supabase-auth.list-users"
          outputParameters:
            - type: object
              mapping: "$."
