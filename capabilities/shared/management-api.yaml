naftiko: "1.0.0-alpha1"

info:
  label: "Supabase Management API"
  description: "Programmatic management of Supabase projects, organizations, Edge Functions, secrets, domains, and network configuration."
  tags:
    - Supabase
    - Management
    - Projects
    - Organizations
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SUPABASE_ACCESS_TOKEN: SUPABASE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: supabase-mgmt
      baseUri: https://api.supabase.com/v1
      description: "Supabase Management API for project and organization control"
      authentication:
        type: bearer
        token: "{{SUPABASE_ACCESS_TOKEN}}"
      resources:
        - name: projects
          path: /projects
          description: "Manage Supabase projects"
          operations:
            - name: list-projects
              method: GET
              description: "List all projects"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-project
              method: POST
              description: "Create a new project"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  organization_id: "{{tools.organization_id}}"
                  db_pass: "{{tools.db_pass}}"
                  region: "{{tools.region}}"

        - name: project
          path: /projects/{ref}
          description: "Manage a specific project by reference ID"
          operations:
            - name: get-project
              method: GET
              description: "Get project details"
              inputParameters:
                - name: ref
                  in: path
                  type: string
                  required: true
                  description: "Project reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-project
              method: DELETE
              description: "Delete a project"
              inputParameters:
                - name: ref
                  in: path
                  type: string
                  required: true
                  description: "Project reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: project-api-keys
          path: /projects/{ref}/api-keys
          description: "Retrieve API keys for a project"
          operations:
            - name: get-project-api-keys
              method: GET
              description: "Get project API keys"
              inputParameters:
                - name: ref
                  in: path
                  type: string
                  required: true
                  description: "Project reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: project-health
          path: /projects/{ref}/health
          description: "Monitor project health"
          operations:
            - name: get-project-health
              method: GET
              description: "Get project health status"
              inputParameters:
                - name: ref
                  in: path
                  type: string
                  required: true
                  description: "Project reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: functions
          path: /projects/{ref}/functions
          description: "Manage Edge Functions for a project"
          operations:
            - name: list-functions
              method: GET
              description: "List Edge Functions"
              inputParameters:
                - name: ref
                  in: path
                  type: string
                  required: true
                  description: "Project reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-function
              method: POST
              description: "Create an Edge Function"
              inputParameters:
                - name: ref
                  in: path
                  type: string
                  required: true
                  description: "Project reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  slug: "{{tools.slug}}"
                  name: "{{tools.name}}"
                  body: "{{tools.body}}"

        - name: secrets
          path: /projects/{ref}/secrets
          description: "Manage project secrets"
          operations:
            - name: list-secrets
              method: GET
              description: "List project secrets"
              inputParameters:
                - name: ref
                  in: path
                  type: string
                  required: true
                  description: "Project reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-secrets
              method: POST
              description: "Create project secrets"
              inputParameters:
                - name: ref
                  in: path
                  type: string
                  required: true
                  description: "Project reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  secrets: "{{tools.secrets}}"

        - name: organizations
          path: /organizations
          description: "Manage organizations"
          operations:
            - name: list-organizations
              method: GET
              description: "List all organizations"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-organization
              method: POST
              description: "Create an organization"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"

  exposes:
    - type: rest
      port: 8100
      namespace: supabase-mgmt-api
      resources:
        - path: /v1/projects
          name: projects
          operations:
            - method: GET
              name: list-projects
              description: "List all Supabase projects"
              call: "supabase-mgmt.list-projects"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-project
              description: "Create a new Supabase project"
              call: "supabase-mgmt.create-project"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects/{ref}
          name: project
          operations:
            - method: GET
              name: get-project
              description: "Get a specific project"
              call: "supabase-mgmt.get-project"
              with:
                ref: "rest.ref"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/organizations
          name: organizations
          operations:
            - method: GET
              name: list-organizations
              description: "List all organizations"
              call: "supabase-mgmt.list-organizations"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: supabase-mgmt-mcp
      transport: http
      tools:
        - name: list-projects
          description: "List all Supabase projects"
          hints:
            readOnly: true
            openWorld: false
          call: "supabase-mgmt.list-projects"
          outputParameters:
            - type: array
              mapping: "$."
        - name: create-project
          description: "Create a new Supabase project"
          hints:
            readOnly: false
            destructive: false
          call: "supabase-mgmt.create-project"
          with:
            name: "tools.name"
            organization_id: "tools.organization_id"
            db_pass: "tools.db_pass"
            region: "tools.region"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-project
          description: "Get a specific project's details"
          hints:
            readOnly: true
            openWorld: false
          call: "supabase-mgmt.get-project"
          with:
            ref: "tools.ref"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-functions
          description: "List Edge Functions for a project"
          hints:
            readOnly: true
            openWorld: false
          call: "supabase-mgmt.list-functions"
          with:
            ref: "tools.ref"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-secrets
          description: "List secrets for a project (names only)"
          hints:
            readOnly: true
            openWorld: false
          call: "supabase-mgmt.list-secrets"
          with:
            ref: "tools.ref"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-organizations
          description: "List all organizations"
          hints:
            readOnly: true
            openWorld: false
          call: "supabase-mgmt.list-organizations"
          outputParameters:
            - type: array
              mapping: "$."
