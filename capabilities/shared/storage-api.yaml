naftiko: "1.0.0-alpha1"

info:
  label: "Supabase Storage API"
  description: "S3-compatible object storage for files, images, and documents with bucket management and on-the-fly image transformation."
  tags:
    - Supabase
    - Storage
    - File Upload
    - Buckets
    - Images
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SUPABASE_ANON_KEY: SUPABASE_ANON_KEY
      SUPABASE_PROJECT_REF: SUPABASE_PROJECT_REF

capability:
  consumes:
    - type: http
      namespace: supabase-storage
      baseUri: "https://{{SUPABASE_PROJECT_REF}}.supabase.co/storage/v1"
      description: "Supabase Storage API for object storage and file management"
      authentication:
        type: apikey
        key: apikey
        value: "{{SUPABASE_ANON_KEY}}"
        placement: header
      resources:
        - name: buckets
          path: /bucket
          description: "Manage storage buckets"
          operations:
            - name: list-buckets
              method: GET
              description: "List all buckets"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-bucket
              method: POST
              description: "Create a new bucket"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  public: "{{tools.public}}"

        - name: objects
          path: /object/{bucket_id}
          description: "Manage objects within a bucket"
          operations:
            - name: upload-file
              method: POST
              description: "Upload a file to a bucket"
              inputParameters:
                - name: bucket_id
                  in: path
                  type: string
                  required: true
                  description: "Bucket ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: object-download
          path: /object/authenticated/{bucket_id}/{object_name}
          description: "Download private files"
          operations:
            - name: download-file
              method: GET
              description: "Download a private file"
              inputParameters:
                - name: bucket_id
                  in: path
                  type: string
                  required: true
                  description: "Bucket ID"
                - name: object_name
                  in: path
                  type: string
                  required: true
                  description: "Object path within the bucket"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: signed-url
          path: /object/sign/{bucket_id}/{object_name}
          description: "Generate signed URLs for temporary access"
          operations:
            - name: create-signed-url
              method: POST
              description: "Create a signed URL"
              inputParameters:
                - name: bucket_id
                  in: path
                  type: string
                  required: true
                  description: "Bucket ID"
                - name: object_name
                  in: path
                  type: string
                  required: true
                  description: "Object path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  expiresIn: "{{tools.expiresIn}}"

  exposes:
    - type: rest
      port: 8102
      namespace: supabase-storage-api
      resources:
        - path: /v1/buckets
          name: buckets
          operations:
            - method: GET
              name: list-buckets
              description: "List all storage buckets"
              call: "supabase-storage.list-buckets"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-bucket
              description: "Create a new storage bucket"
              call: "supabase-storage.create-bucket"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/objects/{bucket_id}/{object_name}/signed-url
          name: signed-url
          operations:
            - method: POST
              name: create-signed-url
              description: "Create a signed URL for temporary file access"
              call: "supabase-storage.create-signed-url"
              with:
                bucket_id: "rest.bucket_id"
                object_name: "rest.object_name"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: supabase-storage-mcp
      transport: http
      tools:
        - name: list-buckets
          description: "List all storage buckets in the project"
          hints:
            readOnly: true
            openWorld: false
          call: "supabase-storage.list-buckets"
          outputParameters:
            - type: array
              mapping: "$."
        - name: create-bucket
          description: "Create a new storage bucket"
          hints:
            readOnly: false
            destructive: false
          call: "supabase-storage.create-bucket"
          with:
            id: "tools.id"
            public: "tools.public"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-signed-url
          description: "Create a signed URL for temporary access to a private file"
          hints:
            readOnly: false
            destructive: false
          call: "supabase-storage.create-signed-url"
          with:
            bucket_id: "tools.bucket_id"
            object_name: "tools.object_name"
            expiresIn: "tools.expiresIn"
          outputParameters:
            - type: object
              mapping: "$."
