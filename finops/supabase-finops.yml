publisherName: Supabase Inc.
serviceCategory: Backend Platform
billingModel:
  pricingCategory: Subscription + Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
focusColumns:
  ServiceName: Supabase
  ServiceCategory: Backend Platform
  ProviderName: Supabase
  PublisherName: Supabase Inc.
  BillingCurrency: USD
meters:
  - name: database_storage
    unit: GB-month
    aggregation: max
    dimensions:
      - project
  - name: egress
    unit: GB
    aggregation: sum
    dimensions:
      - project
      - type
  - name: monthly_active_users
    unit: MAU
    aggregation: max
  - name: file_storage
    unit: GB-month
    aggregation: max
  - name: edge_function_invocations
    unit: invocation
    aggregation: sum
  - name: compute_size_hours
    unit: compute-hour
    aggregation: sum
    dimensions:
      - instance_type
  - name: realtime_messages
    unit: message
    aggregation: sum
principles:
  - name: Visibility
    description: Use Usage tab per project; export billing JSON via Management API.
  - name: Allocation
    description: One project per env (dev/stage/prod); orgs for team-level cost roll-up.
  - name: Optimization
    description: Drop unused indexes; archive cold tables; right-size compute add-ons.
  - name: Accountability
    description: Cap MAU growth via Auth provider gating; quarterly compute right-sizing.
